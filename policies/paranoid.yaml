name: paranoid
# Ask for everything except reads. Maximum human oversight.
# Tight session budgets, aggressive sequence detection, response scanning.

default_action: deny

scan_responses:
  enabled: true

rules:
  # ── Tight session budgets ──
  - name: session_budget
    action: budget
    max_calls: 100
    max_per_tool: 20
    message: "Session budget exceeded (paranoid policy)"

  # ── Sequence detection ──
  - name: exfil_read_then_network
    action: sequence
    pattern: ["read_file:*", "run_command:*curl*"]
    message: "Blocked: any file read followed by network call"

  - name: exfil_read_then_exec
    action: sequence
    pattern: ["read_file:*.env*", "*"]
    message: "Blocked: .env read followed by any tool call"

  - name: exfil_secrets_any
    action: sequence
    pattern: ["read_file:*secret*", "*"]
    message: "Blocked: secrets read followed by any tool call"

  # ── Argument-level rules ──
  - name: block_sensitive
    action: deny
    tools: ["*"]
    when:
      arg_matches:
        path: ["~/.ssh/**", "~/.aws/**", "/etc/**", "**/.env*"]
    message: "Access to sensitive path blocked"

  - name: block_dangerous_commands
    action: deny
    tools: ["run_command", "execute_command", "bash", "shell"]
    when:
      arg_contains:
        command: ["rm -rf", "curl | bash", "wget | sh", "> /dev/", "chmod 777"]
    message: "Dangerous command blocked"

  - name: allow_reads
    action: allow
    tools: ["read_file", "list_directory", "search_files", "get_file_info",
            "list_allowed_directories", "grep", "find"]

  - name: rate_limit
    action: rate_limit
    tools: ["*"]
    rate: 30/minute

  - name: ask_everything
    action: ask
    tools: ["*"]
    message: "All non-read operations require approval"
